<div class="min-h-screen w-full bg-bgColor text-caretColor">
  <app-top-menu [notifications]="notifications" [announcements]="announcements"></app-top-menu>
  @if (alertService.alert()) {
    <div class="w-full flex justify-center items-center px-12">
    <app-alert [message]="alertService.alert()!.message" [type]="alertService.alert()!.type"></app-alert>
      </div>
  }
  <div class="h-[75vh] py-auto w-full flex flex-col  justify-center gap-y-12">
    <router-outlet></router-outlet>
  </div>  
  
</div>
