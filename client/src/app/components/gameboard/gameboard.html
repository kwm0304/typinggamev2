<div class="max-h-[30vh] flex flex-col items-center gap-y-4">
    <div class="pt-1 text-3xl max-w-[75vw] text-[var(--sub-color)] leading-[1.5]">
        @for (char of chars(); track $index) {<span
            class="char-cell"
            [class.char-correct]="char.status === 'correct'"
            [class.char-incorrect]="char.status === 'incorrect'"
        >@if (char.isCurrent) {<span class="typing-caret" aria-hidden="true"></span>}{{ char.char }}</span>}
    </div>
</div>
